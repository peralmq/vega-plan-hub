name: deploy-pages

# Publishes the built app to GitHub Pages (https://peralmq.github.io/vega-plan-hub/).
# Lovable hosting is unaffected: the base path is injected only in this build
# via --base, and the app reads it at runtime from import.meta.env.BASE_URL.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vite build --base=/vega-plan-hub/
      # SPA fallback: GitHub Pages serves 404.html for unknown paths, which
      # lets react-router handle /plan, /summary, etc. on hard refresh.
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
